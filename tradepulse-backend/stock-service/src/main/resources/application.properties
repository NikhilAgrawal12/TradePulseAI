spring.application.name=stock-service
server.port=4003
grpc.server.port=${GRPC_SERVER_PORT:9003}
logging.level.root=info

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Ensure JPA creates/updates tables before data.sql seeding executes.
spring.jpa.defer-datasource-initialization=true

# Connection Pool Optimization (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# Batch Operations Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Query Timeout (prevents hanging queries)
spring.jpa.properties.hibernate.jdbc.query.timeout=30

# Statement caching (reduces parsing overhead)
spring.datasource.hikari.data-source-properties.preparedStatementCacheSize=250
spring.datasource.hikari.data-source-properties.preparedStatementCacheSqlLimit=2048

massive.api.base-url=https://api.massive.com
massive.api.key=${MASSIVE_API_KEY:}
massive.exchanges.sync-on-startup=false
massive.stocks.sync-on-startup=false
massive.stocks.target-count=800
massive.featured.daily-refresh-enabled=true
massive.featured.target-count=50
massive.ohlc.sync-on-startup=false
massive.ohlc.daily-sync-enabled=true
massive.ohlc.years-back=3
massive.ohlc.adjusted=true
massive.ohlc.include-otc=false
massive.ohlc.refresh-initial-delay-minutes=1
massive.ohlc.refresh-interval-minutes=30
massive.ohlc.sync-zone=UTC
ml.service.base-url=${ML_SERVICE_BASE_URL:http://localhost:4010/v1}

# News Integration Configuration
massive.news.integration-enabled=${MASSIVE_NEWS_INTEGRATION_ENABLED:false}
massive.news.daily-scheduler-enabled=${MASSIVE_NEWS_DAILY_SCHEDULER_ENABLED:false}
