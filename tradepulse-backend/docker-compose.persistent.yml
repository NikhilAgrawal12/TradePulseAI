services:
  kafka:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    environment:
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - tradepulse

  auth-service-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "5001:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradepulse

  customer-service-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - cust_db_data:/var/lib/postgresql/data
    ports:
      - "5000:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradepulse

  order-service-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - order_db_data:/var/lib/postgresql/data
    ports:
      - "5003:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradepulse

  payment-service-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    ports:
      - "5004:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradepulse

  portfolio-service-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - portfolio_db_data:/var/lib/postgresql/data
    ports:
      - "5006:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradepulse

  stock-service-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - stock_db_data:/var/lib/postgresql/data
    ports:
      - "5002:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradepulse

  auth-service:
    build: ./auth-service
    image: auth-service:latest
    depends_on:
      auth-service-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-service-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_INTERNAL_API_KEY: ${AUTH_INTERNAL_API_KEY}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE}
      MAIL_SMTP_STARTTLS_REQUIRED: ${MAIL_SMTP_STARTTLS_REQUIRED}
      MAIL_SMTP_CONNECTION_TIMEOUT: ${MAIL_SMTP_CONNECTION_TIMEOUT}
      MAIL_SMTP_TIMEOUT: ${MAIL_SMTP_TIMEOUT}
      MAIL_SMTP_WRITE_TIMEOUT: ${MAIL_SMTP_WRITE_TIMEOUT}
    networks:
      - tradepulse

  payment-service:
    build: ./payment-service
    image: payment-service:latest
    depends_on:
      payment-service-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-service-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - tradepulse

  stock-service:
    build: ./stock-service
    image: stock-service:latest
    depends_on:
      stock-service-db:
        condition: service_healthy
      ml-service:
        condition: service_started
    environment:
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
      MASSIVE_NEWS_INTEGRATION_ENABLED: "true"
      MASSIVE_NEWS_DAILY_SCHEDULER_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://stock-service-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      ML_SERVICE_BASE_URL: http://ml-service:4010/v1
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4003/stocks/market-status >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tradepulse

  customer-service:
    build: ./customer-service
    image: customer-service:latest
    depends_on:
      customer-service-db:
        condition: service_healthy
      kafka:
        condition: service_started
      auth-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://customer-service-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_INTERNAL_API_KEY: ${AUTH_INTERNAL_API_KEY}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - tradepulse

  portfolio-service:
    build: ./portfolio-service
    image: portfolio-service:latest
    depends_on:
      portfolio-service-db:
        condition: service_healthy
      stock-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://portfolio-service-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      STOCK_SERVICE_BASE_URL: http://stock-service:4003
      PAYMENT_SERVICE_GRPC_ADDRESS: payment-service
      PAYMENT_SERVICE_GRPC_PORT: 9002
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - tradepulse

  order-service:
    build: ./order-service
    image: order-service-latest
    depends_on:
      order-service-db:
        condition: service_healthy
      payment-service:
        condition: service_started
      customer-service:
        condition: service_started
      stock-service:
        condition: service_started
      portfolio-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-service-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      ORDER_PAYMENT_SERVICE_ADDRESS: payment-service
      ORDER_PAYMENT_SERVICE_GRPC_PORT: 9002
      STOCK_SERVICE_GRPC_ADDRESS: stock-service
      STOCK_SERVICE_GRPC_PORT: 9003
      PORTFOLIO_SYNC_SERVICE_ADDRESS: portfolio-service
      PORTFOLIO_SYNC_SERVICE_GRPC_PORT: 9005
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - tradepulse

  ml-service:
    build: ./ml-service
    image: ml-service:latest
    depends_on:
      stock-service-db:
        condition: service_healthy
    environment:
      ML_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@stock-service-db:5432/${POSTGRES_DB}
      ML_MODEL_PATH: /ml-model/tradepulse_model.joblib
      ML_SERVICE_PORT: 4010
      ML_DEFAULT_DAYS_BACK: 730
      ML_DEFAULT_HORIZON_DAYS: 5
      ML_DEFAULT_POSITIVE_RETURN_THRESHOLD: 0.015
      ML_DEFAULT_NEUTRAL_RETURN_BAND: 0.015
      ML_MAX_TRAINING_STOCKS: 100
      ML_MAX_TRAINING_ROWS: 100000
      ML_TRAIN_ON_STARTUP: true
      ML_RETRAIN_INTERVAL_HOURS: 168
    volumes:
      - ml_model_data:/ml-model
    networks:
      - tradepulse

  api-gateway:
    build: ./api-gateway
    image: api-gateway:latest
    depends_on:
      auth-service:
        condition: service_started
      customer-service:
        condition: service_started
      stock-service:
        condition: service_healthy
      order-service:
        condition: service_started
      portfolio-service:
        condition: service_started
    environment:
      AUTH_SERVICE_URL: http://auth-service:4005
      CUSTOMER_SERVICE_URL: http://customer-service:4000
    ports:
      - "4004:4004"
    networks:
      - tradepulse

  notification-service:
    build: ./notification-service
    image: notification-service:latest
    depends_on:
      kafka:
        condition: service_started
      auth-service:
        condition: service_started
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTH_SERVICE_BASE_URL: http://auth-service:4005
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-no-reply@tradepulse.local}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_SMTP_STARTTLS_REQUIRED: ${MAIL_SMTP_STARTTLS_REQUIRED:-false}
      MAIL_SMTP_CONNECTION_TIMEOUT: ${MAIL_SMTP_CONNECTION_TIMEOUT:-5000}
      MAIL_SMTP_TIMEOUT: ${MAIL_SMTP_TIMEOUT:-5000}
      MAIL_SMTP_WRITE_TIMEOUT: ${MAIL_SMTP_WRITE_TIMEOUT:-5000}
    networks:
      - tradepulse

networks:
  tradepulse:
    driver: bridge

volumes:
  auth_db_data:
  cust_db_data:
  order_db_data:
  payment_db_data:
  portfolio_db_data:
  stock_db_data:
  kafka_data:
  ml_model_data:
