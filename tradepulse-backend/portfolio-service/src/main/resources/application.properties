spring.application.name=portfolio-service

logging.level.root=info
server.port=4007
grpc.server.port=${GRPC_SERVER_PORT:9005}

# Kafka Producer (for notification events)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

auth.service.base-url=${AUTH_SERVICE_BASE_URL:http://auth-service:4005}
stock.service.base-url=${STOCK_SERVICE_BASE_URL:http://stock-service:4003}
payment.service.grpc.address=${PAYMENT_SERVICE_GRPC_ADDRESS:payment-service}
payment.service.grpc.port=${PAYMENT_SERVICE_GRPC_PORT:9002}
customer.service.base-url=${CUSTOMER_SERVICE_BASE_URL:http://customer-service:4000}

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# Batch Operations
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Statement caching
spring.datasource.hikari.data-source-properties.preparedStatementCacheSize=250
spring.datasource.hikari.data-source-properties.preparedStatementCacheSqlLimit=2048
