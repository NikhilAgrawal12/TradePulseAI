syntax = "proto3";

option java_multiple_files = true;
option java_package = "order_payment";

service OrderPaymentService {
  rpc CompletePayment (OrderPaymentRequest) returns (OrderPaymentResponse);
}

message OrderPaymentRequest {
  string order_id = 1;
  string user_email = 2;
  double total_amount = 3;
}

message OrderPaymentResponse {
  string account_id = 1;
  string status = 2;
}
