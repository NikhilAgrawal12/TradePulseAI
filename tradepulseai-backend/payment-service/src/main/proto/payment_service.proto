syntax= "proto3";


option java_multiple_files = true;
option java_package="payment";

service PaymentService {
    rpc CreatePaymentAccount (PaymentRequest) returns (PaymentResponse);
}

message PaymentRequest {
    string customerId = 1;
    string firstName = 2;
    string email = 3;
}

message PaymentResponse {
  string accountId = 1;
  string status = 2;
}