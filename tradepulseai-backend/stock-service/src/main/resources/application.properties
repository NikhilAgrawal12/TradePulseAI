spring.application.name=stock-service
server.port=4003
grpc.server.port=${GRPC_SERVER_PORT:9003}
logging.level.root=info

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://host.docker.internal:5432/tradepulse_stock}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Ensure JPA creates/updates tables before data.sql seeding executes.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
stock.kafka.topic=${STOCK_KAFKA_TOPIC:stocks}
stock.kafka.consumer.persistence.group-id=${STOCK_KAFKA_PERSISTENCE_GROUP:stock-service-db}
stock.kafka.consumer.websocket.group-id=${STOCK_KAFKA_WEBSOCKET_GROUP:stock-service-ws}

polygon.api.base-url=${POLYGON_API_BASE_URL:https://api.polygon.io}
polygon.api.key=${POLYGON_API_KEY:}
polygon.fetch.enabled=${POLYGON_FETCH_ENABLED:false}
polygon.fetch.fixed-delay-ms=${POLYGON_FETCH_DELAY_MS:12000}
polygon.universe.sync-enabled=${POLYGON_UNIVERSE_SYNC_ENABLED:true}
polygon.universe.target-size=${POLYGON_UNIVERSE_TARGET_SIZE:700}
polygon.universe.page-size=${POLYGON_UNIVERSE_PAGE_SIZE:1000}
