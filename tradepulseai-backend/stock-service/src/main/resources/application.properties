spring.application.name=stock-service
server.port=4003
grpc.server.port=${GRPC_SERVER_PORT:9003}
logging.level.root=info

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Ensure JPA creates/updates tables before data.sql seeding executes.
spring.jpa.defer-datasource-initialization=true

massive.api.base-url=https://api.massive.com
massive.api.key=${MASSIVE_API_KEY:}
massive.exchanges.sync-on-startup=false
massive.stocks.sync-on-startup=false
massive.stocks.target-count=800
massive.featured.daily-refresh-enabled=true
massive.featured.target-count=50
massive.ohlc.sync-on-startup=true
massive.ohlc.daily-sync-enabled=true
massive.ohlc.years-back=3
massive.ohlc.adjusted=true
massive.ohlc.include-otc=false
massive.ohlc.refresh-initial-delay-minutes=1
massive.ohlc.refresh-interval-minutes=30
massive.ohlc.sync-zone=UTC
