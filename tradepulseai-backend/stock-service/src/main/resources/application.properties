spring.application.name=stock-service
server.port=4003
grpc.server.port=${GRPC_SERVER_PORT:9003}
logging.level.root=info

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://host.docker.internal:5432/tradepulse_stock}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Ensure JPA creates/updates tables before data.sql seeding executes.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

polygon.api.base-url=${POLYGON_API_BASE_URL:https://api.massive.com}
polygon.api.key=${POLYGON_API_KEY:}
polygon.fetch.enabled=${POLYGON_FETCH_ENABLED:false}
polygon.fetch.cron=${POLYGON_FETCH_CRON:0 */15 17-23 * * MON-FRI}
polygon.universe.sync-enabled=${POLYGON_UNIVERSE_SYNC_ENABLED:true}
polygon.exchanges.sync-cron=${POLYGON_EXCHANGES_SYNC_CRON:0 0 3 1 * *}
polygon.universe.sync-cron=${POLYGON_UNIVERSE_SYNC_CRON:0 0 4 * * SUN}
polygon.universe.target-size=${POLYGON_UNIVERSE_TARGET_SIZE:700}
polygon.universe.page-size=${POLYGON_UNIVERSE_PAGE_SIZE:1000}
polygon.backfill.lookback-trading-days=${POLYGON_BACKFILL_LOOKBACK_TRADING_DAYS:5}
polygon.backfill.request-delay-ms=${POLYGON_BACKFILL_REQUEST_DELAY_MS:15000}
polygon.backfill.allow-rerun=${POLYGON_BACKFILL_ALLOW_RERUN:false}
