server:
  port: 4004 # Gateway listens on port 4004

spring:
  cloud:
    gateway:
      routes:

        - id: auth-service-route
          uri: http://auth-service:4005
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: customer-service-route
          uri: http://cust-service:4000
          predicates:
            - Path=/api/customers/**
          filters:
            - StripPrefix=1


        - id: api-docs-customer-route
          uri: http://cust-service:4000
          predicates:
            - Path=/api-docs/customers
          filters:
            - RewritePath=/api-docs/customers,/v3/api-docs








