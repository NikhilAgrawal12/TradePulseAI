spring.application.name=cust-service

logging.level.root=info
server.port=4000
grpc.server.port=${GRPC_SERVER_PORT:9004}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:cust-service}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
portfolio.sync.kafka.topic=${PORTFOLIO_SYNC_KAFKA_TOPIC:portfolio-sync}

auth.service.base-url=${AUTH_SERVICE_BASE_URL:http://auth-service:4005}
stock.service.base-url=${STOCK_SERVICE_BASE_URL:http://stock-service:4003}
