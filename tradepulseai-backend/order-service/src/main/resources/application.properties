spring.application.name=order-service
server.port=4006
logging.level.root=info

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

order.payment.service.address=${ORDER_PAYMENT_SERVICE_ADDRESS:payment-service}
order.payment.service.grpc.port=${ORDER_PAYMENT_SERVICE_GRPC_PORT:9002}
stock.service.grpc.address=${STOCK_SERVICE_GRPC_ADDRESS:stock-service}
stock.service.grpc.port=${STOCK_SERVICE_GRPC_PORT:9003}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer
portfolio.sync.kafka.topic=${PORTFOLIO_SYNC_KAFKA_TOPIC:portfolio-sync}
