spring.application.name=order-service
server.port=4006
logging.level.root=info

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

order.payment.service.address=${ORDER_PAYMENT_SERVICE_ADDRESS:payment-service}
order.payment.service.grpc.port=${ORDER_PAYMENT_SERVICE_GRPC_PORT:9002}
stock.service.grpc.address=${STOCK_SERVICE_GRPC_ADDRESS:stock-service}
stock.service.grpc.port=${STOCK_SERVICE_GRPC_PORT:9003}
portfolio.sync.service.address=${PORTFOLIO_SYNC_SERVICE_ADDRESS:portfolio-service}
portfolio.sync.service.grpc.port=${PORTFOLIO_SYNC_SERVICE_GRPC_PORT:9005}

# Connection Pool Optimization
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# Batch Operations
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Query Timeout
spring.jpa.properties.hibernate.jdbc.query.timeout=30

# Statement caching
spring.datasource.hikari.data-source-properties.preparedStatementCacheSize=250
spring.datasource.hikari.data-source-properties.preparedStatementCacheSqlLimit=2048
